<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0a0a0a;--surface:#131313;--surface-2:#1c1c1c;--border:#262626;
    --text:#ededed;--muted:#8b8b8b;
    --accent:#d4af37;--accent-soft:rgba(212,175,55,.12);
    --green:#10b981;--green-soft:rgba(16,185,129,.14);
    --amber:#f59e0b;--amber-soft:rgba(245,158,11,.14);
    --red:#ef4444;--red-soft:rgba(239,68,68,.14);
    --blue:#3b82f6;--meta:#0866ff;--ghl:#7c3aed;
  }
  html,body{font-family:-apple-system,"Segoe UI",Inter,sans-serif;background:var(--bg);color:var(--text);line-height:1.55;font-size:15px;-webkit-font-smoothing:antialiased}
  body{padding-top:54px}
  .container{max-width:1280px;margin:0 auto;padding:0 24px 80px}
  .nav-bar{position:fixed;top:0;left:0;right:0;height:48px;background:rgba(10,10,10,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);z-index:1000;display:flex;align-items:center;gap:14px;padding:0 24px;font-size:12px}
  .nav-brand{font-weight:700;color:var(--accent);letter-spacing:1.5px;text-transform:uppercase;font-size:11px}
  .nav-links{display:flex;gap:16px;flex:1;overflow-x:auto;scrollbar-width:none}
  .nav-links::-webkit-scrollbar{display:none}
  .nav-links a{color:var(--muted);text-decoration:none;white-space:nowrap;font-weight:500}
  .nav-links a:hover{color:var(--text)}

  .banner{background:var(--accent-soft);border:1px dashed var(--accent);border-radius:10px;padding:10px 16px;margin:16px 0 8px;font-size:12.5px;color:var(--accent)}
  .hero{padding:24px 0 14px;border-bottom:1px solid var(--border);margin-bottom:24px}
  .hero-tag{font-size:10.5px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:6px}
  .hero h1{font-size:30px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px}
  .hero-sub{color:var(--muted);font-size:13.5px}

  section{margin-bottom:36px;scroll-margin-top:64px}
  h2{font-size:18px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:10px}
  h2 .num{background:var(--accent);color:#0a0a0a;width:24px;height:24px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
  .sub{color:var(--muted);margin-bottom:16px;font-size:12.5px}

  /* source pills */
  .src{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:1px 6px;border-radius:5px;vertical-align:middle;margin-left:5px}
  .src-meta{background:rgba(8,102,255,.15);color:#5b9bff;border:1px solid rgba(8,102,255,.4)}
  .src-ghl{background:rgba(124,58,237,.15);color:#a98bff;border:1px solid rgba(124,58,237,.4)}
  .src-deriv{background:var(--surface-2);color:var(--muted);border:1px solid var(--border)}

  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin-bottom:8px}

  /* scorecard */
  .scorecard{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  .tile{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px}
  .tile-label{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;font-weight:600;margin-bottom:8px}
  .tile-value{font-size:28px;font-weight:700;letter-spacing:-.02em;line-height:1;font-variant-numeric:tabular-nums}
  .tile-sub{font-size:11.5px;color:var(--muted);margin-top:8px}
  .tile.green{border-left:3px solid var(--green)} .tile.amber{border-left:3px solid var(--amber)} .tile.red{border-left:3px solid var(--red)} .tile.gold{background:linear-gradient(135deg,var(--accent-soft),transparent);border-color:var(--accent)}
  .g{color:var(--green)} .a{color:var(--amber)} .r{color:var(--red)} .gold{color:var(--accent)}

  /* principal card */
  .principal{background:linear-gradient(135deg,var(--accent-soft),transparent);border:1px solid var(--accent);border-radius:16px;padding:22px 26px;margin:4px 0 8px}
  .principal-tag{font-size:11px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px}
  .principal-title{font-size:19px;font-weight:700;margin-bottom:8px}
  .principal-body{font-size:13.5px;opacity:.92}
  .principal-impact{margin-top:10px;font-size:13px;color:var(--green);font-weight:600}

  /* funnel */
  .funnel{display:flex;align-items:stretch;gap:6px;overflow-x:auto;padding-bottom:6px}
  .fstep{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 14px;min-width:140px;text-align:center;flex:1}
  .fstep-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:600;margin-bottom:6px}
  .fstep-n{font-size:26px;font-weight:700;font-variant-numeric:tabular-nums}
  .fstep-cost{margin-top:6px;font-size:11.5px;color:var(--muted)}
  .fstep-conv{margin-top:7px;font-size:17px;font-weight:700;font-variant-numeric:tabular-nums}
  .fstep.cuello{border-color:var(--red)}
  .cuello-tag{margin-top:7px;font-size:9.5px;font-weight:700;color:var(--red);background:var(--red-soft);border-radius:6px;padding:2px 6px;display:inline-block}
  .farrow{display:flex;align-items:center;color:var(--muted);font-size:22px;padding:0 2px}

  /* tables */
  .twrap{border:1px solid var(--border);border-radius:12px;overflow:hidden;overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{background:var(--surface-2);text-align:right;padding:10px 12px;font-weight:600;color:var(--muted);text-transform:uppercase;font-size:10.5px;letter-spacing:.4px;white-space:nowrap}
  th:first-child,td:first-child{text-align:left}
  .ml{text-align:left !important}
  .cellsub{display:block;font-size:9px;color:var(--muted);margin-top:1px;font-weight:400}
  .rowsub{font-size:10.5px;color:var(--muted);margin-top:4px;font-weight:400}
  .wk{font-size:9px;color:var(--muted);font-weight:400}
  .tup{color:var(--red);font-weight:700} .tdn{color:var(--green);font-weight:700}
  .evol td{vertical-align:top}
  .sub2{font-size:10px;color:var(--muted);font-weight:400;margin-top:2px}
  .evol .n{font-weight:700;font-size:14px}
  .evol .c{font-size:12px;margin-top:3px}
  .evol .coh{font-size:11px;color:var(--muted);margin-top:6px;border-top:1px dashed var(--border);padding-top:5px}
  .d{font-size:9.5px;font-weight:600;white-space:nowrap}
  .d.g{color:var(--green)} .d.r{color:var(--red)} .d.n0{color:var(--muted)}
  .dec{padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;white-space:nowrap}
  .dec.esc{background:var(--green-soft);color:var(--green)}
  .dec.obs{background:var(--amber-soft);color:var(--amber)}
  .dec.sd{background:var(--surface-2);color:var(--muted)}
  .dec.pau{background:var(--red-soft);color:var(--amber)}
  .dec.kill{background:var(--red-soft);color:var(--red)}
  .off{color:var(--muted);font-size:10px;font-weight:700}
  .issues{color:var(--red);font-size:9px;font-weight:700;background:var(--red-soft);padding:1px 5px;border-radius:5px}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .subsc{font-size:9px;color:var(--muted);white-space:nowrap}
  td{padding:9px 12px;border-top:1px solid var(--border);text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  tbody tr:hover{background:var(--surface)}
  .pill{background:var(--surface-2);border:1px solid var(--border);border-radius:20px;padding:2px 9px;font-size:11px;color:var(--muted)}
  .on{color:var(--green);font-size:10px;font-weight:700}
  code{background:var(--bg);padding:1px 6px;border-radius:4px;font-family:'SF Mono',Menlo,monospace;font-size:11px;color:var(--accent)}

  /* recs */
  .rec{border:1px solid var(--border);border-left-width:3px;border-radius:10px;padding:13px 16px;margin-bottom:10px;background:var(--surface)}
  .rec.p0{border-left-color:var(--red)} .rec.p1{border-left-color:var(--amber)} .rec.p2{border-left-color:var(--green)}
  .rec-prio{font-size:10px;font-weight:700;letter-spacing:.5px}
  .rec.p0 .rec-prio{color:var(--red)} .rec.p1 .rec-prio{color:var(--amber)} .rec.p2 .rec-prio{color:var(--green)}
  .rec-title{font-size:13.5px;font-weight:700;margin:4px 0 5px}
  .rec-body{font-size:12.5px;color:var(--muted)}
  .toggle{font-size:11px;color:var(--muted);border:1px solid var(--border);border-radius:20px;padding:3px 10px;display:inline-block;margin-left:8px}
  .vista-tabs{display:flex;gap:8px;margin-bottom:12px}
  .vista-tab{font-size:11px;color:var(--muted);border:1px solid var(--border);border-radius:20px;padding:4px 12px;background:var(--surface)}
  .vista-tab.activa{color:var(--accent);border-color:var(--accent);background:var(--accent-soft);font-weight:700}
</style>
